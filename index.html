<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPM Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Times New Roman', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
      }
      
      @media print {
        @page { size: A4; margin: 0; }
        body { margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white; }
        
        /* Reset animations and transforms to prevent fixed positioning issues */
        * {
            animation: none !important;
            transition: none !important;
            transform: none !important;
        }

        /* Hide all UI elements marked with no-print or via utility classes */
        .no-print, header, footer.print\:hidden { display: none !important; }
        
        /* Reset main container layout constraints for print */
        #root, main, .max-w-5xl { 
            width: 100% !important; 
            max-width: none !important; 
            margin: 0 !important; 
            padding: 0 !important;
            overflow: visible !important;
            position: static !important;
        }

        .print-break-before { page-break-before: always; }
        
        .a4-page {
           box-shadow: none !important;
           margin: 0 !important;
           width: 210mm !important;
           min-height: 297mm !important;
           height: auto !important;
           page-break-after: always;
           print-color-adjust: exact;
           overflow: visible !important;
        }
        
        /* Prevent blank page after the last sheet */
        .a4-page:last-of-type {
           page-break-after: auto;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
      }
    </style>

  }
}
</script>
