<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPM Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Times New Roman', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
      }
      
      @media print {
        @page { size: A4; margin: 0; }
        body { margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white; }
        
        /* Reset animations and transforms to prevent fixed positioning issues */
        * {
            animation: none !important;
            transition: none !important;
            transform: none !important;
        }

        /* Hide all UI elements marked with no-print or via utility classes */
        .no-print, header, footer.print\:hidden { display: none !important; }
        
        /* Reset main container layout constraints for print */
        #root, main, .max-w-5xl { 
            width: 100% !important; 
            max-width: none !important; 
            margin: 0 !important; 
            padding: 0 !important;
            overflow: visible !important;
            position: static !important;
        }

        .print-break-before { page-break-before: always; }
        
        .a4-page {
           box-shadow: none !important;
           margin: 0 !important;
           width: 210mm !important;
           min-height: 297mm !important;
           height: auto !important;
           page-break-after: always;
           print-color-adjust: exact;
           overflow: visible !important;
        }
        
        /* Prevent blank page after the last sheet */
        .a4-page:last-of-type {
           page-break-after: auto;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
      }

      /* Beautiful and reliable list styles to prevent overlapping (bertumpuk) */
      ol {
        list-style-type: decimal !important;
        margin-left: 1.5rem !important;
        padding-left: 0.5rem !important;
      }
      ol ol {
        list-style-type: upper-alpha !important;
      }
      ul {
        list-style-type: disc !important;
        margin-left: 1.5rem !important;
        padding-left: 0.5rem !important;
      }
      li {
        display: list-item !important;
        margin-bottom: 0.5rem !important;
        line-height: 1.6 !important;
      }
      
      /* Specific target styling for generated AI content sections */
      .generated-questions-list ol, .prose ol {
        list-style-type: decimal !important;
        margin-left: 1.75rem !important;
        padding-left: 0.5rem !important;
        margin-top: 0.5rem !important;
        margin-bottom: 1.25rem !important;
      }
      .generated-questions-list ol ol, .prose ol ol {
        list-style-type: upper-alpha !important;
        margin-left: 1.5rem !important;
        margin-bottom: 0.5rem !important;
      }
      .generated-questions-list ul, .prose ul {
        list-style-type: disc !important;
        margin-left: 1.75rem !important;
        padding-left: 0.5rem !important;
        margin-top: 0.5rem !important;
        margin-bottom: 1.25rem !important;
      }
      .generated-questions-list li, .prose li {
        display: list-item !important;
        margin-bottom: 0.75rem !important;
        line-height: 1.6 !important;
      }
      
      .prose h1 { font-size: 1.5rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 1rem; color: #1e3a8a; }
      .prose h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.25rem; margin-bottom: 0.75rem; color: #1e40af; }
      .prose h3 { font-size: 1.125rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #1e40af; }
      .prose h4 { font-size: 1rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #374151; }
      .prose p { margin-bottom: 1rem; line-height: 1.6; text-align: justify; }
      .prose strong { font-weight: bold; }
      .prose em { font-style: italic; }
      .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
      .prose th, .prose td { border: 1px solid #d1d5db; padding: 0.5rem; }
      .prose th { background-color: #f3f4f6; font-weight: bold; text-align: left; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "vite": "https://esm.sh/vite@^7.2.7",
    "path": "https://esm.sh/path@^0.12.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>

</head>

  <script type="module" src="/index.tsx"></script>

</html>
